server {
  listen ${PORT};
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback (por si en el futuro se agrega routing del lado cliente)
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cachear assets con hash de Vite
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
